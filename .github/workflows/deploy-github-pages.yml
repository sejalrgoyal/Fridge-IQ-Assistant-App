# Deploys the Vite app to GitHub Pages.
# Repo Settings → Pages → Build and deployment → Source: GitHub Actions
# Site URL: https://<user>.github.io/Fridge-IQ-Assistant-App/

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build for GitHub Pages
        env:
          # Must match your repository name (case-sensitive path segment)
          VITE_BASE_PATH: /Fridge-IQ-Assistant-App/
        run: npm run build

      - name: SPA fallback (direct URL refresh / deep links)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
